<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mark" x1="251" y1="216" x2="808" y2="837" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F0B5FF"/>
      <stop offset="0.42" stop-color="#B887FF"/>
      <stop offset="0.68" stop-color="#66E8FF"/>
      <stop offset="1" stop-color="#35F3E2"/>
    </linearGradient>
    <linearGradient id="highlight" x1="303" y1="244" x2="708" y2="732" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.82"/>
      <stop offset="0.55" stop-color="#FFFFFF" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="noteGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(383 663) rotate(-28) scale(235 190)">
      <stop offset="0" stop-color="#47FFF1" stop-opacity="0.76"/>
      <stop offset="0.58" stop-color="#7EDBFF" stop-opacity="0.2"/>
