    </radialGradient>
    <filter id="outerGlow" x="82" y="82" width="860" height="860" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="38" result="blurLarge"/>
      <feFlood flood-color="#7A55FF" flood-opacity="0.46" result="violet"/>
      <feComposite in="violet" in2="blurLarge" operator="in" result="violetGlow"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="18" result="blurSmall"/>
      <feFlood flood-color="#35F3E2" flood-opacity="0.5" result="cyan"/>
      <feComposite in="cyan" in2="blurSmall" operator="in" result="cyanGlow"/>
      <feMerge>
        <feMergeNode in="violetGlow"/>
        <feMergeNode in="cyanGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerSoft" x="150" y="150" width="720" height="720" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feBlend mode="screen" in="SourceGraphic" in2="blur"/>
    </filter>
  </defs>

